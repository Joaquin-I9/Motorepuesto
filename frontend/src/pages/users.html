<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Motorepuestos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-checking">
    <div id="navbar"></div>

    <div class="container container-wide">

        <div class="page-head">
            <div class="part-tag part-tag-left">PANEL DE ACCESOS</div>
            <h1><span class="brand-mark">👥</span> Gestión de usuarios</h1>
            <p class="page-subtitle">Administrá las cuentas del taller y sus permisos.</p>
        </div>

        <div class="inventory-layout">

            <div class="card card-form-panel" id="user-form-card">
                <div class="card-rivet rivet-tl"></div>
                <div class="card-rivet rivet-tr"></div>

                <div class="form-panel-head">
                    <span class="form-panel-eyebrow">Ficha de usuario</span>
                    <h2 id="user-form-title">Agregar usuario</h2>
                </div>

                <form id="usuario-form">
                    <input type="hidden" id="usuario-id">

                    <div class="form-group">
                        <label for="u-nombre">Nombre</label>
                        <input type="text" id="u-nombre" required placeholder="Nombre y apellido">
                    </div>
                    <div class="form-group">
                        <label for="u-email">Email</label>
                        <input type="email" id="u-email" required placeholder="usuario@email.com">
                    </div>
                    <div class="form-group">
                        <label for="u-password">Contraseña</label>
                        <input type="password" id="u-password" placeholder="Dejar vacío para no cambiar (al editar)">
                    </div>
                    <div class="form-group">
                        <label for="u-rol">Rol</label>
                        <select id="u-rol" required>
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                            <option value="SUPERADMIN">SUPERADMIN</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit">Guardar usuario</button>
                        <button type="button" id="btn-cancel-user" class="btn-secondary" style="display: none;">Cancelar</button>
                    </div>
                </form>
            </div>

            <div class="card card-table-panel">
                <div class="table-panel-head">
                    <h2>Lista de usuarios</h2>
                    <span class="table-panel-tag">CUENTAS ACTIVAS</span>
                </div>

                <div class="table-scroll">
                    <table id="tabla-usuarios">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="../users.js"></script>
</body>
</html>
