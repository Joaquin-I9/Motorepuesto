<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Motorepuestos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-checking">
    <div id="navbar"></div>

    <div class="container container-wide">

        <div class="page-head">
            <div class="part-tag part-tag-left">PANEL DE INVENTARIO</div>
            <h1><span class="brand-mark">⚙</span> Inventario de Motorepuestos</h1>
            <p class="page-subtitle">Cargá, editá y controlá el stock de cada repuesto del taller.</p>
        </div>

        <div class="inventory-layout">

            <div class="card card-form-panel" id="form-card">
                <div class="card-rivet rivet-tl"></div>
                <div class="card-rivet rivet-tr"></div>

                <div class="form-panel-head">
                    <span class="form-panel-eyebrow">Ficha de pieza</span>
                    <h2 id="form-title">Agregar repuesto</h2>
                </div>

                <form id="repuesto-form">
                    <input type="hidden" id="repuesto-id">

                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required placeholder="Ej: Pastillas de freno">
                    </div>
                    <div class="form-group">
                        <label for="marca">Marca</label>
                        <input type="text" id="marca" required placeholder="Ej: Honda">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="precio">Precio</label>
                            <div class="input-prefix">
                                <span class="input-prefix-symbol">$</span>
                                <input type="number" id="precio" required min="0" step="0.01" placeholder="0.00">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="stock">Stock</label>
                            <input type="number" id="stock" required min="0" placeholder="0">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-save">Guardar repuesto</button>
                        <button type="button" id="btn-cancel" class="btn-secondary" style="display: none;">Cancelar</button>
                    </div>
                </form>
            </div>

            <div class="card card-table-panel">
                <div class="table-panel-head">
                    <h2>Lista de repuestos</h2>
                    <span class="table-panel-tag">STOCK ACTUAL</span>
                </div>

                <div class="table-scroll">
                    <table id="tabla-repuestos">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Marca</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th id="th-acciones">Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="../productos.js"></script>
</body>
</html>
